name: Build

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/build.yml"
      - "build.spec"
      - "app/**"
      - "main.py"
      - "gui_main.py"
      - "uv.lock"
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.platform.os }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: linux
            runner: ubuntu-22.04
          - os: windows
            runner: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Build
        run: uv run pyinstaller build.spec

      - name: Generate artifact name
        id: artifact_name
        shell: bash
        run: |
          ARTIFACT_NAME="wplace-auto-painter_${{ matrix.platform.os }}_${GITHUB_SHA::7}"
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITHUB_OUTPUT
          echo "Generated artifact name: $ARTIFACT_NAME"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_name.outputs.ARTIFACT_NAME }}
          path: |
            dist/
