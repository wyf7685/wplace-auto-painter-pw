name: Build

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/build.yml"
      - "build.spec"
      - "app/**"
      - "main.py"
      - "uv.lock"
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.platform.os }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: linux
            runner: ubuntu-22.04
          - os: windows
            runner: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Install UPX
        uses: crazy-max/ghaction-upx@v4
        with:
          install-only: true

      - name: Build
        env:
          BUILD_CI: "true"
          BUILD_ONEFILE: "true"
        run: |
          upx --version
          uv run pyinstaller build.spec

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wplace-auto-painter_${{ matrix.platform.os }}
          path: |
            dist/
